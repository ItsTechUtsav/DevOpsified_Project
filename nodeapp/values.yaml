replicaCount: 2

image:
   repository: 596953737188.dkr.ecr.ap-south-1.amazonaws.com/devopsified
   tag: latest
   pullPolicy: Always

imagePullSecrets:
  - name: ecr-secret

service:
   type: NodePort
   port: 3000
   targetPort: 3000
   nodePort: 30009

ingress:
  enabled: true
  className: nginx

  host: myapp.local

  path: /
  pathType: Prefix
