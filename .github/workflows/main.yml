name: Build, Push & Deploy to Kubernetes

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devopsified
  ECR_REGISTRY: 596953737188.dkr.ecr.ap-south-1.amazonaws.com
  IMAGE_TAG: latest

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.sha }} .

      - name: Tag Docker Image
        run: |
          docker tag \
          $ECR_REPOSITORY:${{ github.sha }} \
          $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Deploy to EC2 Kubernetes Cluster
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/DevOpsified_Project_1

            PASSWORD=$(aws ecr get-login-password --region ap-south-1)

            kubectl delete secret ecr-secret --ignore-not-found

            kubectl create secret docker-registry ecr-secret \
              --docker-server=596953737188.dkr.ecr.ap-south-1.amazonaws.com \
              --docker-username=AWS \
              --docker-password="$PASSWORD"

            cd nodeapp

            helm upgrade --install myapp . \
              --set image.tag=${{ github.sha }}

            kubectl rollout status deployment/myapp-deployment

            kubectl get pods

            kubectl get svc
